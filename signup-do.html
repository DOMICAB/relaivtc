<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Inscription DO</title>
<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1E3A8A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="RelaiVTC" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js" defer></script>
</head><body>
<main class="container auth-box">
  <h1 class="logo"><span class="relai">Relai</span><span class="vtc">VTC</span></h1>
  <p class="subtitle">Inscription DO</p>
  <input id="signup_do_email" type="email" placeholder="Email" />
  <div class="password-row"><input id="signup_do_password" type="password" placeholder="Mot de passe" /><button type="button" class="toggle-pass" onclick="togglePassword('signup_do_password', this)">👁</button></div>
  <input id="signup_do_first_name" type="text" placeholder="Prénom" />
  <input id="signup_do_last_name" type="text" placeholder="Nom" />
  <input id="signup_do_company_name" type="text" placeholder="Société" />
  <input id="signup_do_phone" type="tel" placeholder="Téléphone" />
  <button class="btn-blue" onclick="signupDo()">Créer un compte DO</button>
  <p id="signup_do_message" class="message"></p>
  <a class="back-link" href="index.html">Retour connexion</a>
</main>
</body></html>
