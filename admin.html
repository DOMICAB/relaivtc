<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>admin.html</title>

<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1E3A8A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="RelaiVTC" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js" defer></script>

</head>
<body>

<main class="container page-box">
<header class="page-header">
  <div><h1 class="logo"><span class="relai">Relai</span><span class="vtc">VTC</span></h1><h2>Espace admin</h2><div class="live-pill">Live + refresh secours</div></div>
  <div class="header-actions"><button class="btn-refresh" onclick="softRefreshAdmin()">🔄 Rafraîchir</button><button class="btn-light" onclick="logout()">Déconnexion</button></div>
</header>
<section class="card"><h3>Vue globale</h3><div class="admin-stats"><div class="stat-box"><strong id="admin_do_count">0</strong><span>DO</span></div><div class="stat-box"><strong id="admin_driver_count">0</strong><span>Chauffeurs</span></div><div class="stat-box"><strong id="admin_mission_count">0</strong><span>Missions</span></div><div class="stat-box"><strong id="admin_active_count">0</strong><span>En cours</span></div></div></section>
<section class="card"><div class="section-head"><h3>DO inscrits</h3><button class="btn-soft" onclick="softRefreshAdmin()">Actualiser</button></div><div id="admin_do_list"></div></section>
<section class="card"><div class="section-head"><h3>Chauffeurs inscrits</h3><button class="btn-soft" onclick="softRefreshAdmin()">Actualiser</button></div><div id="admin_driver_list"></div></section>
<section class="card"><div class="section-head"><h3>Missions</h3><button class="btn-soft" onclick="softRefreshAdmin()">Actualiser</button></div><div id="admin_missions_list"></div></section>
<p id="admin_message" class="message"></p>
</main>

</body>
</html>
