<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>index.html</title>

<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1E3A8A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="RelaiVTC" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js" defer></script>

</head>
<body>

<main class="container auth-box">
  <h1 class="logo"><span class="relai">Relai</span><span class="vtc">VTC</span></h1>
  <p class="subtitle">Connexion</p>
  <input id="email" type="email" placeholder="Email" />
  <div class="password-row">
    <input id="password" type="password" placeholder="Mot de passe" />
    <button type="button" class="toggle-pass" onclick="togglePassword('password', this)">👁</button>
  </div>
  <button class="btn-green" onclick="login()">Connexion</button>
  <div class="links-box">
    <p class="small-title">Pas encore inscrit ?</p>
    <a class="link-btn link-btn-green" href="signup-do.html">Créer un compte DO</a>
    <a class="link-btn link-btn-blue" href="signup-driver.html">Créer un compte chauffeur</a>
  </div>
  <p id="message" class="message"></p>
</main>

</body>
</html>
