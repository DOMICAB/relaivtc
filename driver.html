<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Espace chauffeur</title>
<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1E3A8A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="RelaiVTC" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js" defer></script>
</head><body>
<main class="container page-box">
<header class="page-header">
  <div><h1 class="logo"><span class="relai">Relai</span><span class="vtc">VTC</span></h1><h2>Espace chauffeur</h2><div class="live-pill">Live activé • secours manuel disponible</div></div>
  <div class="header-actions"><button class="btn-refresh" onclick="softRefreshDriver()">🔄 Rafraîchir</button><button class="btn-light" onclick="logout()">Déconnexion</button></div>
</header>
<section class="card"><div class="section-head"><h3>GPS préféré</h3><button class="btn-soft" onclick="updateDriverLocation()">Mettre à jour ma position</button></div><div class="gps-choice-row"><label class="gps-option"><input type="radio" name="gps_choice" value="google" onchange="setGPSChoice('google')"> Google Maps</label><label class="gps-option"><input type="radio" name="gps_choice" value="waze" onchange="setGPSChoice('waze')"> Waze</label></div><p id="gps_message" class="message"></p><p id="driver_location_message" class="message"></p></section>
<div id="new_mission_alert" class="alert-live hidden">Nouvelle mission disponible 🔔</div>
<p id="driver_message" class="message"></p>
<section class="card"><div class="section-head"><h3>Missions disponibles</h3><button class="btn-soft" onclick="softRefreshDriver()">Actualiser</button></div><div id="driver_missions_list"></div></section>
<section class="card"><div class="section-head"><h3>Mes missions acceptées</h3><button class="btn-soft" onclick="softRefreshDriver()">Actualiser</button></div><div id="driver_assigned_list"></div></section>
</main>
</body></html>
